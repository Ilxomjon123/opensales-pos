name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Write .env from secrets/vars
        shell: bash
        run: |
          cat > .env <<EOF
          VITE_RECOVERY_MASTER=${{ secrets.VITE_RECOVERY_MASTER }}
          VITE_OWNER_MASTER=${{ secrets.VITE_OWNER_MASTER }}
          VITE_INTEGRITY_SECRET=${{ secrets.VITE_INTEGRITY_SECRET }}
          VITE_DEFAULT_PIN=${{ secrets.VITE_DEFAULT_PIN }}
          VITE_LICENSE_PUBKEY=${{ vars.VITE_LICENSE_PUBKEY }}
          VITE_TRIAL_DAYS=${{ vars.VITE_TRIAL_DAYS }}
          VITE_SUPPORT_PHONE=${{ vars.VITE_SUPPORT_PHONE }}
          VITE_SUPPORT_NAME=${{ vars.VITE_SUPPORT_NAME }}
          VITE_SITE_URL=${{ vars.VITE_SITE_URL }}
          VITE_BACKUP_REPO=${{ vars.VITE_BACKUP_REPO }}
          VITE_BACKUP_TOKEN=${{ secrets.VITE_BACKUP_TOKEN }}
          EOF

      # Updater artefaktlarini imzolaydi (latest.json + .sig)
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'OpenSales POS ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Imzolangan artefaktlarni OCHIQ releases repoga ko'chiradi + latest.json URL larini almashtiradi
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Relocate to public releases repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUB_TOKEN: ${{ secrets.GH_RELEASES_TOKEN }}
        run: |
          set -e
          TAG=${{ github.ref_name }}
          PRIV=${{ github.repository }}
          PUB=Ilxomjon123/opensales-pos-releases
          mkdir dl && cd dl
          # private (draft) release'dan barcha artefaktlar
          gh release download "$TAG" -R "$PRIV" --clobber
          # latest.json URL larini public repoga almashtirish
          if [ -f latest.json ]; then
            sed -i "s#$PRIV/releases/download#$PUB/releases/download#g" latest.json
          fi
          # public release (yo'q bo'lsa yaratish)
          GH_TOKEN=$PUB_TOKEN gh release view "$TAG" -R "$PUB" >/dev/null 2>&1 \
            || GH_TOKEN=$PUB_TOKEN gh release create "$TAG" -R "$PUB" -t "OpenSales POS $TAG" --notes "OpenSales POS $TAG"
          # barcha fayllarni yuklash
          GH_TOKEN=$PUB_TOKEN gh release upload "$TAG" -R "$PUB" ./* --clobber
